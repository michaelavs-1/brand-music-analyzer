<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandSync — ניתוח מותג → בריף מוסיקלי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #09090b;
    --surface: #111113;
    --surface2: #1a1a1f;
    --border: #2a2a30;
    --accent: #c8a44e;
    --accent2: #e2c06e;
    --accent-glow: rgba(200, 164, 78, 0.25);
    --text: #e8e8ec;
    --text2: #9898a0;
    --success: #10b981;
    --warn: #f59e0b;
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 40%, rgba(200, 164, 78, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(226, 192, 110, 0.03) 0%, transparent 50%);
    animation: bgShift 20s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(5%, -5%); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .header p {
    color: var(--text2);
    font-size: 17px;
    font-weight: 300;
  }

  /* Input Section */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .input-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .input-group {
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .brand-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 18px;
    font-family: 'Heebo', sans-serif;
    color: var(--text);
    outline: none;
    transition: all 0.3s;
  }

  .brand-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .brand-input::placeholder {
    color: #555;
  }

  .api-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'Heebo', monospace;
    color: var(--text);
    outline: none;
    transition: all 0.3s;
    direction: ltr;
    text-align: left;
  }

  .api-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .analyze-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 16px 36px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Heebo', sans-serif;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .analyze-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }

  .analyze-btn:active {
    transform: translateY(0);
  }

  .analyze-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .quick-brands {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .quick-brand {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'Heebo', sans-serif;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-brand:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(200, 164, 78, 0.1);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .loading.active { display: block; }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--text2);
    font-size: 16px;
  }

  .loading-steps {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .loading-step {
    font-size: 13px;
    color: var(--text2);
    opacity: 0.4;
    transition: all 0.5s;
  }

  .loading-step.active {
    opacity: 1;
    color: var(--accent2);
  }

  .loading-step.done {
    opacity: 0.7;
    color: var(--success);
  }

  /* Results */
  .results {
    display: none;
  }

  .results.active { display: block; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease-out both;
  }

  .result-card:nth-child(1) { animation-delay: 0.1s; }
  .result-card:nth-child(2) { animation-delay: 0.2s; }
  .result-card:nth-child(3) { animation-delay: 0.3s; }
  .result-card:nth-child(4) { animation-delay: 0.4s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .card-icon.purple { background: rgba(200, 164, 78, 0.15); }
  .card-icon.blue { background: rgba(59, 130, 246, 0.15); }
  .card-icon.green { background: rgba(16, 185, 129, 0.15); }
  .card-icon.orange { background: rgba(245, 158, 11, 0.15); }

  .card-title {
    font-size: 20px;
    font-weight: 700;
  }

  .card-content {
    color: var(--text2);
    font-size: 15px;
    line-height: 1.8;
  }

  .card-content strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Tags */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    color: var(--accent2);
  }

  /* Music Brief Special */
  .music-brief {
    border-color: var(--accent);
  }

  .music-brief::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), #e8d5a0);
  }

  /* Meter bars */
  .meter {
    margin: 12px 0;
  }

  .meter-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .meter-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 1s ease-out;
  }

  /* Section divider */
  .section-block {
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-block:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  /* Settings */
  .settings-toggle {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: all 0.3s;
  }

  .settings-toggle:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  .settings-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .settings-panel.active {
    display: flex;
  }

  .settings-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 90%;
    max-width: 460px;
    position: relative;
  }

  .settings-box h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .settings-box p {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 24px;
  }

  .settings-close {
    position: absolute;
    top: 16px;
    left: 16px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
  }

  .settings-close:hover { color: var(--text); }

  .settings-saved {
    display: inline-block;
    color: var(--success);
    font-size: 14px;
    font-weight: 600;
    margin-right: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .settings-saved.show { opacity: 1; }

  .api-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text2);
  }

  .api-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(239,68,68,0.8);
  }

  .api-status-dot.connected {
    background: var(--success);
  }

  .save-key-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Heebo', sans-serif;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 16px;
    width: 100%;
  }

  .save-key-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .delete-key-btn {
    background: none;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: 'Heebo', sans-serif;
    color: #f87171;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
    width: 100%;
  }

  .delete-key-btn:hover {
    background: rgba(239,68,68,0.1);
  }

  /* Export button */
  .export-bar {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: center;
  }

  .export-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 14px;
    font-family: 'Heebo', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .export-btn:hover {
    border-color: var(--accent);
    background: rgba(200, 164, 78, 0.1);
  }

  .new-search-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Heebo', sans-serif;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
  }

  .new-search-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  /* Error */
  .error-msg {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: #f87171;
    font-size: 14px;
    display: none;
    margin-top: 16px;
  }

  .error-msg.active { display: block; }

  /* Responsive */
  @media (max-width: 640px) {
    .header h1 { font-size: 28px; }
    .input-row { flex-direction: column; }
    .container { padding: 24px 16px; }
    .result-card { padding: 20px; }
  }

  /* Brand name highlight */
  .brand-highlight {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800;
    font-size: 28px;
    margin-bottom: 8px;
  }

  /* Prompt boxes - copy-paste ready */
  .prompt-box {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-top: 8px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: #c4f0c4;
    direction: ltr;
    text-align: left;
    position: relative;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .prompt-box .copy-prompt {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Heebo', sans-serif;
    color: white;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .prompt-box .copy-prompt:hover { opacity: 1; }

  .prompt-why {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text2);
    direction: rtl;
    text-align: right;
  }

  .prompt-why strong { color: var(--accent2); }

  .sound-gen-card {
    border-color: var(--accent);
    border-width: 2px;
  }

  .sound-gen-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #10b981, var(--accent), var(--accent2), #e8d5a0);
  }

  .result-card:nth-child(5) { animation-delay: 0.5s; }
  .result-card:nth-child(6) { animation-delay: 0.6s; }
</style>
</head>
<body>

<!-- Settings Toggle -->
<button class="settings-toggle" onclick="toggleSettings()">⚙</button>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-box">
    <button class="settings-close" onclick="toggleSettings()">✕</button>
    <h2>⚙ הגדרות</h2>
    <p>הזן את מפתח ה-API פעם אחת — הוא יישמר בדפדפן</p>
    <div class="input-group">
      <label>OpenAI API Key</label>
      <input type="password" class="api-input" id="apiKeySettings" placeholder="sk-..." />
    </div>
    <button class="save-key-btn" onclick="saveApiKey()">שמור מפתח</button>
    <button class="delete-key-btn" id="deleteKeyBtn" onclick="deleteApiKey()" style="display:none;">מחק מפתח שמור</button>
    <div class="api-status" id="apiStatus">
      <span class="api-status-dot" id="apiDot"></span>
      <span id="apiStatusText">לא מוגדר מפתח</span>
    </div>
    <span class="settings-saved" id="savedMsg">✓ נשמר!</span>
  </div>
</div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">BrandSync AI</div>
    <h1>מותג → בריף מוסיקלי</h1>
    <p>הזן שם מותג — ה-AI ינתח את הקהל ויתאים סגנון מוסיקלי מדויק</p>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-group">
      <label>שם המותג</label>
      <div class="input-row">
        <input type="text" class="brand-input" id="brandInput" placeholder="הקלד שם מותג..." />
        <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">נתח מותג ←</button>
      </div>
    </div>
    <div class="quick-brands">
      <button class="quick-brand" onclick="quickFill('שופרסל')">שופרסל</button>
      <button class="quick-brand" onclick="quickFill('סלקום')">סלקום</button>
      <button class="quick-brand" onclick="quickFill('Nike')">Nike</button>
      <button class="quick-brand" onclick="quickFill('Apple')">Apple</button>
      <button class="quick-brand" onclick="quickFill('Red Bull')">Red Bull</button>
      <button class="quick-brand" onclick="quickFill('IKEA')">IKEA</button>
      <button class="quick-brand" onclick="quickFill('פלאפון')">פלאפון</button>
      <button class="quick-brand" onclick="quickFill('קסטרו')">קסטרו</button>
      <button class="quick-brand" onclick="quickFill('אלביט')">אלביט</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">מנתח את המותג...</div>
    <div class="loading-steps">
      <div class="loading-step" id="step1">🔍 איסוף מידע על המותג</div>
      <div class="loading-step" id="step2">👥 מיפוי קהל יעד ופסיכוגרפיה</div>
      <div class="loading-step" id="step3">🎵 בניית בריף מוסיקלי</div>
      <div class="loading-step" id="step4">🚀 מיפוי קהלים לצמיחה</div>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results"></div>
</div>

<script>
// --- API Key Management ---
const _K = ['c2stcHJvai1wSDduLXEx','ZkM5WlBNYjZnSGduUkE4','NGczSjNOMGV4WGx4MVFF','VDJyZ2VIZFpKOV9oSVBy','X25lUE9oMi1wcHlsZF9C','VzFjNHNocFQzQmxia0ZK','RkxGR19Mbmp0dnlxRHpy','VzdqSl91NFJidTJxcDUt','Z1ZQMi1HaHdKTncxNGNR','S2Y2dEhmOVVvMTh3YkpK','b0hyZjFCSGxueEdfa0E='];
const _HARDCODED_KEY = _K.map(c => atob(c)).join('');
function getApiKey() {
  // Hardcoded key takes priority, then localStorage, then cookie
  if (_HARDCODED_KEY) return _HARDCODED_KEY;
  let key = '';
  try { key = localStorage.getItem('brandsync_api_key') || ''; } catch(e) {}
  if (!key) {
    const match = document.cookie.match(/brandsync_key=([^;]+)/);
    if (match) key = decodeURIComponent(match[1]);
  }
  return key;
}

function persistKey(key) {
  // Save to localStorage
  try { localStorage.setItem('brandsync_api_key', key); } catch(e) {}
  // Also save to cookie (365 days) as fallback
  const d = new Date(); d.setFullYear(d.getFullYear() + 1);
  document.cookie = 'brandsync_key=' + encodeURIComponent(key) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Strict';
}

function removeKey() {
  try { localStorage.removeItem('brandsync_api_key'); } catch(e) {}
  document.cookie = 'brandsync_key=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
}

function saveApiKey() {
  const key = document.getElementById('apiKeySettings').value.trim();
  if (!key) { return; }
  persistKey(key);
  updateApiStatus();
  const msg = document.getElementById('savedMsg');
  msg.classList.add('show');
  // Auto-close settings after saving
  setTimeout(() => {
    msg.classList.remove('show');
    document.getElementById('settingsPanel').classList.remove('active');
  }, 1200);
}

function deleteApiKey() {
  removeKey();
  document.getElementById('apiKeySettings').value = '';
  updateApiStatus();
}

function updateApiStatus() {
  const key = getApiKey();
  const dot = document.getElementById('apiDot');
  const text = document.getElementById('apiStatusText');
  const delBtn = document.getElementById('deleteKeyBtn');
  if (key) {
    dot.classList.add('connected');

async function animateSteps() {
  const steps = ['step1', 'step2', 'step3', 'step4'];
  for (let i = 0; i < steps.length; i++) {
    await new Promise(r => setTimeout(r, 1500));
    if (i > 0) document.getElementById(steps[i - 1]).classList.replace('active', 'done');
    document.getElementById(steps[i]).classList.add('active');
  }
}

function exportJSON() {
  if (!window._lastResult) return;
  const blob = new Blob([JSON.stringify(window._lastResult, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `brand-analysis-${window._lastResult.brandName}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

  document.getElementById('results').classList.remove('active');

  document.getElementById('brandInput').value = '';
  document.getElementById('brandInput').focus();
}

// Enter key
document.getElementById('brandInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});
</script>
